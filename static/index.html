<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCP 서버 관리 대시보드</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>NCP 서버 관리</h1>
            <p class="schedule-info">
                현재: <span id="current-time">--:--:--</span>
            </p>
            <div class="header-actions">
                <a href="/settings" class="btn btn-settings">⚙ 설정</a>
            </div>
        </header>

        <div id="autostop-banner" class="banner-warning" style="display: none;"></div>
        <div id="unassigned-banner" class="banner-warning" style="display: none;"></div>

        <div class="status-cards">
            <div class="card">
                <h3>그룹</h3>
                <div class="value" id="group-count">-</div>
            </div>
            <div class="card">
                <h3>자동 관리 대상</h3>
                <div class="value" id="server-count">-</div>
                <div style="font-size: 0.7rem; color: #888; margin-top: 4px;" id="server-count-sub">그룹에 할당된 서버만 자동 시작/중지</div>
            </div>
            <div class="card">
                <h3>미할당 서버</h3>
                <div class="value" id="unassigned-count">-</div>
                <div style="font-size: 0.7rem; color: #888; margin-top: 4px;">자동 관리 제외</div>
            </div>
            <div class="card">
                <h3>자동 중지</h3>
                <div id="auto-stop-status"><span class="status-badge none">확인 중...</span></div>
            </div>
            <div class="card">
                <h3>API 상태</h3>
                <div id="api-status"><span class="status-badge off">확인 중...</span></div>
                <div style="font-size: 0.7rem; color: #888; margin-top: 4px; display: none;" id="api-status-sub"></div>
            </div>
        </div>

        <div class="section accent-purple">
            <div class="section-header">
                <h2>그룹별 업무 시간</h2>
            </div>
            <div id="group-container" class="group-grid">
                <div class="loading"><div class="spinner"></div><p>불러오는 중...</p></div>
            </div>
        </div>

        <div class="section accent-blue">
            <div class="section-header">
                <h2>서버 목록</h2>
                <div class="btn-group">
                    <button id="btn-refresh" class="btn btn-refresh" onclick="refreshServers()">새로고침</button>
                    <div class="tooltip-container">
                        <div class="custom-tooltip">각 그룹의 시간 규칙에 맞춰<br>서버를 <strong>시작</strong>하거나 <strong>중지</strong>합니다.<br>(미할당 서버는 제외)</div>
                        <button class="btn btn-sync" onclick="runScheduler(this)">동기화</button>
                    </div>
                    <div class="btn-divider"></div>
                    <button class="btn btn-start" onclick="startAllServers(this)">전체 시작</button>
                    <button class="btn btn-stop" onclick="openStopModal()">전체 중지</button>
                </div>
            </div>
            <div id="server-container">
                <div class="loading"><div class="spinner"></div><p>불러오는 중...</p></div>
            </div>
        </div>
    </div>

    <!-- 전체 중지 범위 선택 모달 -->
    <div id="stop-modal" class="modal-overlay" style="display: none;">
        <div class="modal-box">
            <h3>전체 중지</h3>
            <p id="stop-modal-desc"></p>
            <div class="modal-actions">
                <button class="btn btn-stop" id="stop-all-btn"></button>
                <button class="btn btn-stop-outline" id="stop-assigned-btn"></button>
                <button class="btn btn-settings" onclick="closeStopModal()">취소</button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script>
        let serverList = null;          // null = 아직 미로드, [] = 로드됐지만 0대
        let groups = [];
        let autoStopEnabled = true;
        let refreshTimer = null;

        function esc(str) {
            return String(str ?? '').replace(/[&<>"']/g,
                c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }

        function pad(n) { return String(n).padStart(2, '0'); }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type === 'success' ? '' : type}`.trim();
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), type === 'success' ? 3500 : 6500);
        }

        // 중복 클릭 방지: 요청 동안 버튼 비활성화
        async function withBusy(btn, fn) {
            if (!btn) return fn();
            if (btn.disabled) return;
            const orig = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '처리 중...';
            try { await fn(); }
            finally { btn.disabled = false; btn.innerHTML = orig; }
        }

        async function fetchStatus() {
            try {
                const response = await fetch('/api/status');
                if (!response.ok) return;
                const data = await response.json();

                groups = data.groups || [];
                autoStopEnabled = !!data.auto_stop_enabled;
                document.getElementById('group-count').textContent = groups.length;

                document.getElementById('api-status').innerHTML = data.api_configured
                    ? '<span class="status-badge work">연결됨</span>'
                    : '<span class="status-badge off">미설정</span>';
                const apiSub = document.getElementById('api-status-sub');
                if (!data.api_configured) {
                    apiSub.textContent = 'NCP_ACCESS_KEY / NCP_SECRET_KEY 환경변수를 설정하세요';
                    apiSub.style.display = 'block';
                } else {
                    apiSub.style.display = 'none';
                }

                document.getElementById('auto-stop-status').innerHTML = autoStopEnabled
                    ? '<span class="status-badge work">켜짐</span>'
                    : '<span class="status-badge warn">꺼짐</span>';
                updateAutoStopBanner();

                renderGroups();
                renderServers();
            } catch (error) {
                console.error('Status fetch error:', error);
            }
        }

        function updateTime() {
            document.getElementById('current-time').textContent = new Date().toTimeString().split(' ')[0];
        }

        function updateAutoStopBanner() {
            const banner = document.getElementById('autostop-banner');
            if (autoStopEnabled) {
                banner.style.display = 'none';
                return;
            }
            banner.innerHTML = `
                <span>⚠️ <strong>자동 중지가 꺼져 있습니다.</strong> 업무 종료 시간이 되어도 서버가 중지되지 않습니다. (자동 시작은 계속 동작)</span>
                <a href="/settings" class="btn btn-settings">설정에서 켜기 →</a>`;
            banner.style.display = 'flex';
        }

        function renderGroups() {
            const container = document.getElementById('group-container');

            if (groups.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>그룹이 없습니다</h3>
                        <p style="margin-bottom: 12px;">그룹을 만들고 서버를 할당해야 자동 시작/중지가 동작합니다.</p>
                        <a href="/settings" class="btn btn-add">설정에서 그룹 추가 →</a>
                    </div>`;
                return;
            }

            container.innerHTML = groups.map(g => `
                <div class="group-card">
                    <div class="group-card-header">
                        <span class="group-name">${esc(g.name)}</span>
                        ${g.is_work_time
                            ? '<span class="status-badge work">업무중</span>'
                            : '<span class="status-badge idle">업무시간 외</span>'}
                    </div>
                    <div class="group-row">
                        🕒 ${pad(g.start_hour)}:${pad(g.start_minute)} ~ ${pad(g.end_hour)}:${pad(g.end_minute)}
                        · 주말 ${g.include_weekends ? '포함' : '제외'}
                    </div>
                    <div class="group-meta">할당 서버: <strong>${g.server_count}대</strong></div>
                </div>
            `).join('');
        }

        function updateBanner() {
            const banner = document.getElementById('unassigned-banner');
            if (!serverList) { banner.style.display = 'none'; return; }

            const unassigned = serverList.filter(s => s.groupId == null).length;
            if (unassigned === 0) {
                banner.style.display = 'none';
                return;
            }

            const allUnassigned = unassigned === serverList.length && serverList.length > 0;
            banner.innerHTML = `
                <span>⚠️ ${allUnassigned
                    ? `모든 서버(${unassigned}대)가 그룹 미할당 상태입니다. 지금은 <strong>아무 서버도 자동 시작/중지되지 않습니다.</strong>`
                    : `미할당 서버 <strong>${unassigned}대</strong>는 자동 시작/중지되지 않습니다.`}
                </span>
                <a href="/settings" class="btn btn-settings">설정에서 할당하기 →</a>`;
            banner.style.display = 'flex';
        }

        async function refreshServers() {
            if (refreshTimer) clearTimeout(refreshTimer);

            const container = document.getElementById('server-container');
            if (!serverList) {
                container.innerHTML = '<div class="loading"><div class="spinner"></div><p>불러오는 중...</p></div>';
            }

            try {
                const response = await fetch('/api/servers');

                if (!response.ok) {
                    const data = await response.json().catch(() => ({}));
                    handleServerListError(data.detail || `HTTP ${response.status}`);
                    return;
                }

                const data = await response.json();
                serverList = data.getServerInstanceListResponse.serverInstanceList || [];
                renderServers();
                scheduleAutoRefresh();
            } catch (error) {
                handleServerListError(error.message);
            }
        }

        function handleServerListError(message) {
            const container = document.getElementById('server-container');
            if (serverList && serverList.length > 0) {
                // 기존 목록을 지우지 않고 유지, 폴링 체인도 유지
                console.error('서버 목록 갱신 실패 (기존 목록 유지):', message);
                showToast('서버 목록 갱신 실패 (기존 화면 유지): ' + message, 'error');
                scheduleAutoRefresh();
            } else {
                container.innerHTML = `<div class="error">서버 목록 조회 실패: ${esc(message)}</div>`;
            }
        }

        function scheduleAutoRefresh() {
            const hasPending = (serverList || []).some(s =>
                getStatusClass(s.serverInstanceStatus.code, s.serverInstanceOperation?.code) === 'pending');

            const refreshBtn = document.getElementById('btn-refresh');

            if (hasPending) {
                refreshBtn.innerHTML = '새로고침 <small style="font-size:0.6rem; opacity:0.7;">(자동...)</small>';
                refreshBtn.title = '상태 변경 중 - 10초마다 자동으로 새로고침됩니다';
                refreshTimer = setTimeout(refreshServers, 10000);
            } else {
                refreshBtn.innerHTML = '새로고침';
                refreshBtn.title = '';
            }
        }

        function renderServers() {
            const container = document.getElementById('server-container');
            if (serverList === null) return;   // 아직 로드 전이면 로딩 표시 유지

            const assigned = serverList.filter(s => s.groupId != null).length;
            const unassigned = serverList.length - assigned;
            document.getElementById('server-count').textContent = assigned;
            document.getElementById('server-count-sub').textContent =
                `전체 ${serverList.length}대 중 그룹 할당됨`;
            document.getElementById('unassigned-count').textContent = unassigned;
            updateBanner();

            if (serverList.length === 0) {
                container.innerHTML = '<div class="empty-state"><h3>서버가 없습니다</h3></div>';
                return;
            }

            container.innerHTML = serverList.map(server => {
                const statusCode = server.serverInstanceStatus.code;
                const operationCode = server.serverInstanceOperation?.code;
                const statusName = server.serverInstanceStatusName;

                const statusClass = getStatusClass(statusCode, operationCode);
                const statusText = getStatusText(statusCode, operationCode, statusName);
                const isRunning = statusClass === 'running';
                const isStopped = statusClass === 'stopped';
                const isPending = statusClass === 'pending';

                const group = groups.find(g => g.id === server.groupId);
                const groupTag = group
                    ? `<span class="group-tag" title="${esc(group.name)}">${esc(group.name)}</span>`
                    : '<span class="group-tag unassigned">미할당</span>';

                // 그룹 규칙 기준 기대 상태와 실제 상태가 다르면 표시
                let mismatch = '';
                if (group && !isPending) {
                    if (group.is_work_time && isStopped) {
                        mismatch = '<span class="mismatch-badge" title="그룹 규칙상 지금은 켜져 있어야 합니다">업무중인데 정지됨</span>';
                    } else if (!group.is_work_time && isRunning && autoStopEnabled) {
                        mismatch = '<span class="mismatch-badge" title="그룹 규칙상 지금은 꺼져 있어야 합니다">업무시간 외 실행 중</span>';
                    }
                }

                return `
                    <div class="server-item">
                        <div class="server-info">
                            <div class="server-name">${esc(server.serverName)}</div>
                            <div class="server-id">${esc(server.serverInstanceNo)}</div>
                        </div>
                        <div class="server-status">
                            ${mismatch}
                            ${groupTag}
                            <span>${esc(statusText)}</span>
                            <div class="status-dot ${statusClass}"></div>
                            <button class="btn btn-start" data-action="start" data-no="${esc(server.serverInstanceNo)}" ${isRunning || isPending ? 'disabled' : ''}>시작</button>
                            <button class="btn btn-stop" data-action="stop" data-no="${esc(server.serverInstanceNo)}" ${isStopped || isPending ? 'disabled' : ''}>중지</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 서버별 시작/중지 버튼: 이벤트 위임 (인라인 onclick의 JS 문자열 이스케이프 문제 회피)
        document.getElementById('server-container').addEventListener('click', (e) => {
            const btn = e.target.closest('button[data-action]');
            if (!btn || btn.disabled) return;
            const no = btn.dataset.no;
            const action = btn.dataset.action;
            withBusy(btn, () => action === 'start' ? startServer(no) : stopServer(no));
        });

        function getStatusClass(statusCode, operationCode) {
            if (operationCode && operationCode !== 'NULL') {
                return 'pending';
            }
            switch(statusCode) {
                case 'RUN': return 'running';
                case 'NSTOP': case 'STOP': return 'stopped';
                default: return 'pending';
            }
        }

        function getStatusText(statusCode, operationCode, statusName) {
            if (operationCode && operationCode !== 'NULL') {
                const opTexts = {
                    'SHTDN': '정지 중',
                    'START': '시작 중',
                    'REBOT': '재시작 중',
                    'TERMT': '반납 중'
                };
                return opTexts[operationCode] || statusName || operationCode;
            }
            const texts = {
                'RUN': '실행 중',
                'NSTOP': '정지됨', 'STOP': '정지됨',
                'INIT': '초기화 중', 'CREAT': '생성 중'
            };
            return texts[statusCode] || statusName || statusCode;
        }

        async function postAction(url, body, failLabel) {
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                if (!response.ok) {
                    const data = await response.json().catch(() => ({}));
                    showToast(`${failLabel}: ${data.detail || `HTTP ${response.status}`}`, 'error');
                    return false;
                }
                return true;
            } catch (error) {
                showToast(`${failLabel}: ${error.message}`, 'error');
                return false;
            }
        }

        async function startServer(serverNo) {
            if (await postAction('/api/servers/start', { server_instance_nos: [serverNo] }, '시작 실패')) {
                showToast('시작 요청 전송됨');
                setTimeout(refreshServers, 2000);
            }
        }

        async function stopServer(serverNo) {
            if (await postAction('/api/servers/stop', { server_instance_nos: [serverNo] }, '중지 실패')) {
                showToast('중지 요청 전송됨');
                setTimeout(refreshServers, 2000);
            }
        }

        async function startAllServers(btn) {
            const nos = (serverList || []).map(s => s.serverInstanceNo);
            if (nos.length === 0) return showToast('서버가 없습니다.', 'warn');
            if (!confirm(`필터된 서버 ${nos.length}대(미할당 포함)를 모두 시작하시겠습니까?`)) return;
            await withBusy(btn, async () => {
                if (await postAction('/api/servers/start', { server_instance_nos: nos }, '시작 실패')) {
                    showToast(`시작 요청 전송됨 (${nos.length}대)`);
                    setTimeout(refreshServers, 2000);
                }
            });
        }

        // ===== 전체 중지: 범위 선택 모달 =====
        function openStopModal() {
            const all = serverList || [];
            if (all.length === 0) return showToast('서버가 없습니다.', 'warn');

            const assigned = all.filter(s => s.groupId != null);
            const unassignedCount = all.length - assigned.length;

            document.getElementById('stop-modal-desc').textContent =
                unassignedCount > 0
                    ? `전체 ${all.length}대 중 ${unassignedCount}대는 그룹 미할당 서버입니다. 중지 범위를 선택하세요.`
                    : `필터된 서버 ${all.length}대를 모두 중지합니다.`;

            const allBtn = document.getElementById('stop-all-btn');
            allBtn.textContent = `전체 ${all.length}대 중지 (미할당 포함)`;
            allBtn.onclick = () => execStopAll(all.map(s => s.serverInstanceNo), allBtn);

            const assignedBtn = document.getElementById('stop-assigned-btn');
            if (assigned.length > 0 && unassignedCount > 0) {
                assignedBtn.style.display = '';
                assignedBtn.textContent = `할당된 서버 ${assigned.length}대만 중지`;
                assignedBtn.onclick = () => execStopAll(assigned.map(s => s.serverInstanceNo), assignedBtn);
            } else {
                assignedBtn.style.display = 'none';
            }

            document.getElementById('stop-modal').style.display = 'flex';
        }

        function closeStopModal() {
            document.getElementById('stop-modal').style.display = 'none';
        }

        async function execStopAll(nos, btn) {
            await withBusy(btn, async () => {
                if (await postAction('/api/servers/stop', { server_instance_nos: nos }, '중지 실패')) {
                    showToast(`중지 요청 전송됨 (${nos.length}대)`);
                    setTimeout(refreshServers, 2000);
                }
            });
            closeStopModal();
        }

        function buildSyncPreview() {
            // 각 그룹의 현재 규칙 기준으로 시작/중지될 서버 수를 예측
            let willStart = 0, willStop = 0;
            for (const s of serverList || []) {
                const group = groups.find(g => g.id === s.groupId);
                if (!group) continue;
                const cls = getStatusClass(s.serverInstanceStatus.code, s.serverInstanceOperation?.code);
                if (group.is_work_time && cls === 'stopped') willStart++;
                if (!group.is_work_time && cls === 'running') willStop++;
            }
            return { willStart, willStop };
        }

        async function runScheduler(btn) {
            const { willStart, willStop } = buildSyncPreview();
            let msg = '각 그룹의 시간 규칙을 지금 즉시 적용합니다.\n\n';
            msg += `· 시작될 서버: ${willStart}대\n`;
            if (!autoStopEnabled) {
                msg += `· 중지될 서버: 0대 (자동 중지가 꺼져 있어 중지는 수행되지 않음)\n`;
            } else if (willStop > 0) {
                msg += `· ⚠️ 중지될 서버: ${willStop}대 — 업무 외 시간인 그룹의 서버가 즉시 꺼집니다!\n`;
            } else {
                msg += `· 중지될 서버: 0대\n`;
            }
            msg += '\n(미할당 서버는 변경되지 않습니다) 진행하시겠습니까?';
            if (!confirm(msg)) return;

            await withBusy(btn, async () => {
                try {
                    const response = await fetch('/api/scheduler/run', { method: 'POST' });
                    const data = await response.json().catch(() => ({}));
                    if (response.ok) {
                        let result = `동기화 완료 — 시작 ${data.started ?? 0}대, 중지 ${data.stopped ?? 0}대`;
                        if (data.stop_skipped) result += '\n(자동 중지 꺼짐 상태라 중지는 건너뜀)';
                        showToast(result);
                        if (data.errors && data.errors.length) {
                            showToast('일부 그룹 처리 실패:\n' + data.errors.join('\n'), 'error');
                        }
                        refreshServers();
                    } else {
                        showToast('동기화 실패: ' + (data.detail || `HTTP ${response.status}`), 'error');
                    }
                } catch (error) {
                    showToast('요청 실패: ' + error.message, 'error');
                }
            });
        }

        // Init
        (async () => {
            await fetchStatus();
            await refreshServers();
        })();
        setInterval(updateTime, 1000);
        setInterval(() => { fetchStatus(); refreshServers(); }, 60000);
    </script>
</body>
</html>
