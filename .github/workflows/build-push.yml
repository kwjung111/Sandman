name: build-push

on:
  push:
    branches: [main]

# 같은 브랜치에 연속 푸시 시 이전 빌드 취소 (latest 태그 경합 방지)
concurrency:
  group: build-push-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # 레지스트리 설정이 없으면(포크 등) 빌드만 하고 푸시는 건너뜀
    env:
      REGISTRY: ${{ vars.HARBOR_REGISTRY }}
      PROJECT: ${{ vars.HARBOR_PROJECT }}
    steps:
      - uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: env.REGISTRY != ''
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_ROBOT_USER }}
          password: ${{ secrets.HARBOR_ROBOT_SECRET }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ env.REGISTRY != '' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT }}/ncp-server-manager:latest
            ${{ env.REGISTRY }}/${{ env.PROJECT }}/ncp-server-manager:${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
