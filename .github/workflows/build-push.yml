name: build-push

on:
  push:
    branches: [main]

# 같은 브랜치에 연속 푸시 시 이전 빌드 취소 (latest 태그 경합 방지)
concurrency:
  group: build-push-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # 레지스트리 설정이 없으면(포크 등) 빌드만 하고 푸시는 건너뜀
    env:
      REGISTRY: ${{ vars.HARBOR_REGISTRY }}
      PROJECT: ${{ vars.HARBOR_PROJECT }}
      IMAGE_NAME: ${{ vars.IMAGE_NAME || 'ncp-server-manager' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve image tags
        id: meta
        run: |
          SHORT="${GITHUB_SHA::7}"
          if [ -n "$REGISTRY" ] && [ -n "$PROJECT" ]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
            echo "tags=$REGISTRY/$PROJECT/$IMAGE_NAME:latest,$REGISTRY/$PROJECT/$IMAGE_NAME:$SHORT" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::HARBOR_REGISTRY/HARBOR_PROJECT 변수 미설정 - 빌드 검증만 수행 (푸시 생략)"
            echo "push=false" >> "$GITHUB_OUTPUT"
            echo "tags=$IMAGE_NAME:ci" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to registry
        if: steps.meta.outputs.push == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_ROBOT_USER }}
          password: ${{ secrets.HARBOR_ROBOT_SECRET }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ steps.meta.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
